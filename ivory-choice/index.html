<style>

.btn-primary,.btn-p{min-height:48px;padding:12px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,rgba(212,165,116,0.25),rgba(212,165,116,0.1));color:#f5e6d0;font-size:15px;cursor:pointer;font-family:inherit;font-weight:700;transition:all 0.25s;border:1px solid rgba(212,165,116,0.15)}
.btn-p:hover{background:linear-gradient(135deg,rgba(212,165,116,0.35),rgba(212,165,116,0.15));box-shadow:0 4px 24px rgba(212,165,116,0.12);transform:translateY(-1px)}
.btn-secondary,.btn-s{min-height:44px;padding:10px 24px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;background:rgba(255,255,255,0.02);color:rgba(245,230,208,0.4);font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.2s}

.ed.u{background:rgba(212,165,116,0.08);border:1px solid rgba(212,165,116,0.15);color:#d4a574}

.ds{margin:8px 0}.ds h3{font-size:15px;font-weight:700;color:#f5e6d0;margin-bottom:6px}
.dc{border-radius:12px;padding:14px;margin-bottom:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}

.drw:last-child{border-bottom:none}.dl{font-size:13px;color:rgba(245,230,208,0.5)}.dv{font-size:14px;font-weight:700;color:#f5e6d0}
.dv.r{color:#fca5a5}.dv.g{color:#86efac}.scmp{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}

.sbx .num{font-size:24px;font-weight:800}.sbx .num.r{color:#fca5a5}.sbx .num.g{color:#86efac}.sbx .l2{font-size:10px;color:rgba(212,165,116,0.25);margin-top:1px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
@media(max-width:480px){body{padding:6px}#app{min-height:95vh}.intro h1{font-size:26px}.intro .logo{font-size:64px}.scene-img,.simg{font-size:42px}.scene-text,.stxt{font-size:16px}.cbtn{font-size:15px;min-height:46px}.eicon{font-size:52px}.scmp{grid-template-columns:1fr}}

</head><body><div id="app">
<script>

/* ═══════════════════════════════════════════════════════════════
   象牙之殇 — 一头非洲象的命运抉择
   Ivory Elegy · Scene Engine
   ═══════════════════════════════════════════════════════════════ */

const STATE_KEY='ivory_elegy_data';
const ENDINGS_KEY='ivory_elegy_endings';

// ── Default State ──────────────────────────────────────────
const defaultState={
  scene:'start',alertness:3,herdBond:5,chosenPath:null,
  visitedScenes:[],firstPlay:true,gameStarted:false
};

function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(STATE_KEY)||'{}');
    return{...defaultState,...d};
  }catch{return{...defaultState}}
}
function saveState(s){
  try{localStorage.setItem(STATE_KEY,JSON.stringify(s))}catch{}
}
function getEndings(){
  try{return JSON.parse(localStorage.getItem(ENDINGS_KEY)||'{}')}catch{return{}}
}
function saveEnding(id){
  const e=getEndings();
  if(!e[id]){e[id]={unlockedAt:Date.now()};localStorage.setItem(ENDINGS_KEY,JSON.stringify(e))}
}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

// ── Scene Data ─────────────────────────────────────────────
const S={
  /* 1: BIRTH */
  start:{
    img:'🐘',loc:'塞伦盖蒂平原 · 雨季',
    text:`<p>你出生了。</p><p>这是东非草原一个湿润的清晨。你跌跌撞撞地从母亲的体内滑落到柔软的草地上，羊膜还裹着你颤抖的四肢。你的母亲——一头魁梧的非洲象——用她的鼻子温柔地把你扶起来。</p><p>你叫<strong>恩科西</strong>（Nkosi），在当地语言中意为"君王"。</p><p>当你终于站直身体，第一次用你的眼睛看这个世界时，你看到了整个象群正在注视着你。祖母——族群中最年长的雌象——扬起象鼻，发出了一声低沉而悠长的鸣叫。这是欢迎，也是一种宣告：一个新的生命，带着一对小小的象牙芽，加入了这片土地。</p>`,
    choices:[{t:'跟着妈妈学习用鼻子喝水',n:'growth'}]
  },

  /* 2: GROWTH (choice) */
  growth:{
    img:'🌅',loc:'草原 · 数年后的旱季',
    text:`<p>你长大了。你的象牙已经开始从嘴角两侧伸出来，像两柄小小的弯刀。你的力气越来越大，胆子也越来越大。</p><p>这一年，旱季格外漫长。象群在祖母的带领下，沿着世代相传的路线寻找水源。终于，你们到达了一条几乎干涸的河流。</p><p>但河边有异常的气味——金属的、刺鼻的、不属于任何动物的气味。河床上躺着一具巨大的骨架，头骨上两个空洞的眼眶直直地望着天空。那是一头被夺走了象牙的成年公象。</p><p>象群骚动不安。母亲用身体挡住你的视线，发出低沉的咕噜声。</p>`,
    choices:[
      {t:'听从母亲，紧跟象群离开这里',n:'conservative'},
      {t:'靠近那具骨架，弄清楚发生了什么',n:'adventure'}
    ]
  },

  /* 3A: CONSERVATIVE path */
  conservative:{
    img:'🐘🌙',loc:'密林深处 · 夜晚',
    text:`<p>你压住了自己的好奇心，紧跟在母亲的身后。象群在夜色中默默移动，只有巨大的脚步声和偶尔的树枝断裂声打破沉默。</p><p>祖母走在队伍的最前面，她不需要月光也能找到路。她在这片土地上走了六十多年，她的记忆就是整个族群的导航图。</p><p>你跟在她身后，学习她行走的每一个转弯，记住每一个水源的气味。渐渐地，你明白了：象群的智慧不在象牙里，而在记忆里。</p><p>几天后，你们到达了一处隐蔽的山谷。这里有充足的水源，茂密的灌木可以提供掩护。祖母停了下来。这里安全了——暂时。</p>`,
    science:'在非洲象的社会中，族群由年长的雌性族长领导。族长通常是最年长、经验最丰富的雌象，她的记忆对族群的生存至关重要——她能记住几十年前的水源位置、迁徙路线和安全区域。',
    choices:[{t:'守护这片宁静的山谷',n:'trapped'}],
    effect:{herdBond:+2}
  },

  /* 3B: ADVENTURE path */
  adventure:{
    img:'☀️🔍',loc:'干涸河床 · 正午',
    text:`<p>你绕过了母亲的阻拦，走近了那具骨架。</p><p>烈日下，白骨反射着刺眼的光。你看到了头骨两侧整齐的切口——那是人类用工具切割象牙留下的痕迹。地上还有几个烟头、一段绳索、一张褪色的包装纸。</p><p>你用象鼻轻轻触碰那具骨架的颅骨。它已经在这里躺了很久了。但你依然能在风中嗅到一丝若有若无的血腥味。</p><p>你抬起头，望向远方。地平线上，一道细细的烟柱正在升起。那不是野火。</p><p>你的心怦怦直跳。你意识到，这片草原上出现了新的捕食者——不是狮子，不是鬣狗——而是用两条腿走路的、带着金属工具的、想要你的象牙的捕食者。</p>`,
    science:'在莫桑比克戈龙戈萨国家公园，持续数十年的内战和盗猎导致了一个惊人的现象：1970年代，约2%的雌象天生没有象牙；但在内战结束后，这个比例飙升到了33%以上。这不是缓慢的自然选择，而是在数十年间发生的、由人类活动驱动的人为进化。',
    choices:[{t:'记住这一切，回到象群报信',n:'trapped'}],
    effect:{alertness:+2}
  },

  /* 4: TRAPPED — both paths converge */
  trapped:{
    img:'🔥🌫️',loc:'山谷 · 黄昏 · 浓烟弥漫',
    text:`<p>你在庇护所中度过了几年平静的时光。但和平从来都不长久。</p><p>那天黄昏，你闻到了烟的味道。不是草原野火的那种自然气息——而是燃烧的轮胎和塑料的刺鼻气味。风向标显示，火正在从四面八方向山谷包围过来。</p><p>人类。他们找到了这里。</p><p>象群陷入了恐慌。幼象在啼哭，成年象在四处冲撞。祖母努力维持秩序，但她的声音第一次显露出了疲惫。</p><p>浓烟遮蔽了天空，你几乎看不清前方的路。呛人的烟雾灼烧着你的喉咙和眼睛。你必须做出选择——带领族群冲出一个方向。</p>`,
    choices:[
      {t:'朝北——记忆中祖辈的水源地突围',n:'end_guardian'},
      {t:'朝东——浓烟最薄的方向，但地形未知',n:'end_survivor'},
      {t:'朝西——陡峭的山脊，但可能有隐蔽洞穴',n:'end_hermit'},
      {t:'留在原地保护幼象，断后掩护',n:'end_requiem'}
    ]
  },

  /* ════ 4 ENDINGS ════ */

  /* ENDING 1: 隐士之牙 —  high herdBond, conservative path */
  end_hermit:{
    img:'🏞️',ending:true,type:'good',
    title:'隐士之牙',
    tag:'好结局',tagClass:'good',
    text:`<p>你带领象群向西面的山脊冲去。火焰在你的两侧蔓延，但你的记忆中浮现出了祖母曾提起的一个地方——一个隐藏在岩石后面的洞穴入口。</p><p>你用它作为路标，带领族群穿过火墙。小象们紧贴着母亲的腹部，每一步都踩在你踏过的地面上。</p><p>当最后一只脚掌踏进洞穴的阴影中时，外面的世界已经成了一片火海。但洞穴深处，有水渗出的声响。</p><p>你在那个隐蔽的洞穴里生活了很多年。外面的世界发生了很多变化——人类的来访渐渐变少了。你的族群在这个隐秘的庇护所中繁衍，小象们在这里出生、长大，从未见过人类的影子。</p><p>你的象牙已经长得又长又弯。但你从不把它们展示给除了月亮以外的任何人。在月光下，你是一头传说，是大地的秘密。</p>`,
    science:'在安哥拉和莫桑比克的一些偏远地区，存在少量"幽灵象群"——它们生活在人类难以到达的密林深处，极少与人类接触。这些象群保留了更高的遗传多样性，包括完整的象牙基因。它们是大象基因库中最后的"时间胶囊"。',
    statLabel:'选择了隐世之路'
  },

  /* ENDING 2: 守护者之牙 —  high alertness, either path */
  end_guardian:{
    img:'🌅🛡️',ending:true,type:'good',
    title:'守护者之牙',
    tag:'好结局',tagClass:'good',
    text:`<p>你选择了北方。</p><p>那是你在旱季迁徙中跟随祖母走过无数次的方向。你记得每一块路标岩石，每一条干涸的溪谷。你走在象群的最前面，每一步都坚定而沉稳。</p><p>你们抵达水源地时，天已经亮了。火势没有蔓延到这里。清澈的湖水在晨光中泛着金色的波光。小象们冲进水里，用鼻子喷水嬉戏。</p><p>但你没有放松警惕。你站上湖岸的高地，用你的身体守护着整个象群的背后。你的影子在晨光中拉得很长很长，像一个黑色的剪影覆盖着整片湖面。</p><p>几年后，保护区建立了。你成为了这片区域象群的象征。人类在远处观察你，称你为"老酋长"。你的左象牙上有一道深深的裂痕——那是穿过火场时留下的。但你的眼睛依然明亮，你的脚步依然坚定。</p>`,
    science:'自1990年代以来，非洲多国通过建立跨境保护区（如Kavango-Zambezi Transfrontier Conservation Area）和社区共管模式，使一些区域的大象数量开始缓慢回升。纳米比亚的象群数量从1995年的约7,500头增长到了2020年的约24,000头，成为非洲大象保护的成功典范。',
    statLabel:'选择了守护之道'
  },

  /* ENDING 3: 幸存者之牙 —  low herdBond, adventure path */
  end_survivor:{
    img:'🌄🐘',ending:true,type:'mid',
    title:'幸存者之牙',
    tag:'中性结局',tagClass:'mid',
    text:`<p>你选择了浓烟最薄的方向，带领部分族群向东突围。那是一片你不熟悉的区域——地形崎岖，植被稀疏。</p><p>你们穿越了焦黑的土地，走过了人类的村庄（深夜，当没有人看见的时候），跨过了一条又一条公路。族群在逃亡中不断分裂——一些倒下了，一些走散了，一些选择留在原地等待援救。</p><p>最终，你身边只剩下三头年轻的公象。你们到达了一片陌生的草原，这里的草很高，水源很少，但暂时没有人类的踪迹。</p><p>你活下来了。族群也活下来了——只是不再完整。</p><p>你的左象牙在你穿过一片偷猎者设下的铁丝网时被折断了，只剩下半截。那半截断牙的断面在阳光下泛着温润的光，像一枚被敲响过的钟。</p>`,

    text:`<p>你选择了断后。</p><p>你让所有象先走——幼象在最里面，年轻雌象在第二层，成年雄象在外围。你站在最后面，面对着逼近的火光和火光照耀下的人影。</p><p>枪声响起时，你用自己的身体挡住了射向象群的子弹。</p><p>你倒下的时候，听到了母亲的声音——不是惨叫，而是一声长长的、颤抖的告别鸣叫。那声音穿过火光，穿过烟雾，传到了你的耳朵里。你试图回应她，但你的身体已经不听使唤了。</p><p>你的眼睛望着天空。浓烟散开了一角，露出了一颗星星。</p><p>你的象牙还在。他们还没来得及取走它们。</p><p>在你的身后，你的族群消失在了夜色中。</p>`,

    statLabel:'选择了牺牲之路'
  }

// ── Engine ─────────────────────────────────────────────────
let state=loadState();
const app=document.getElementById('app');

function startGame(){
  state={scene:'start',alertness:3,herdBond:5,chosenPath:null,
         visitedScenes:[],firstPlay:false,gameStarted:true};
  saveState(state);
  goToScene('start');
}

function goToScene(id){
  const scene=S[id];if(!scene)return;
  state.scene=id;
  if(!state.visitedScenes.includes(id))state.visitedScenes.push(id);
  state.gameStarted=true;
  saveState(state);
  renderScene(id);
}

function choose(nextId){
  // apply state effects from current scene
  const cur=S[state.scene];
  if(cur&&cur.effect){
    if(cur.effect.alertness)state.alertness=clamp(state.alertness+cur.effect.alertness,0,10);
    if(cur.effect.herdBond)state.herdBond=clamp(state.herdBond+cur.effect.herdBond,0,10);
  }
  // track path
  if(!state.chosenPath){
    if(nextId==='conservative')state.chosenPath='conservative';
    else if(nextId==='adventure')state.chosenPath='adventure';
  }
  saveState(state);
  goToScene(nextId);
}

function renderScene(id){
  const scene=S[id];
  if(!scene){renderStart();return}
  const pct=getProgress();
  const endings=getEndings();
  const unlockedCount=Object.keys(endings).length;

  const buildChoices=()=>{
    if(scene.ending)return renderEnding(scene,id);
    if(!scene.choices||scene.choices.length===0)return'';
    return`<div class="choices">${scene.choices.map((c,i)=>
      `<button class="choice-btn" onclick="choose('${c.n}')"><span class="label"><span class="num">${i+1}</span>${c.t}</span></button>`
    ).join('')}</div>`;
  };

  const sciHtml=scene.science?`
    <div class="sci-card" id="scicard">
      <div class="sci-header" onclick="document.getElementById('scicard').classList.toggle('open')">
        <span>📖</span><span>科学知识卡片</span><span class="arrow">▶</span>
      </div>
      <div class="sci-body">${scene.science}</div>
    </div>`:'';

  app.innerHTML=`
  <div class="screen active">
    <div class="game-title">象牙之殇</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="scene-img">${scene.img||'🐘'}</div>
    ${scene.loc?`<div class="scene-location">${scene.loc}</div>`:''}
    <div class="scene-text">${scene.text}</div>
    ${sciHtml}
    ${buildChoices()}
    <div class="endings-grid">
      <div class="dot ${endings.end_hermit?'unlocked':'locked'} ${id==='end_hermit'?'current':''}">${endings.end_hermit?'🏞️':'?'}</div>
      <div class="dot ${endings.end_guardian?'unlocked':'locked'} ${id==='end_guardian'?'current':''}">${endings.end_guardian?'🛡️':'?'}</div>
      <div class="dot ${endings.end_survivor?'unlocked':'locked'} ${id==='end_survivor'?'current':''}">${endings.end_survivor?'🌄':'?'}</div>
      <div class="dot ${endings.end_requiem?'unlocked':'locked'} ${id==='end_requiem'?'current':''}">${endings.end_requiem?'🕊️':'?'}</div>
    </div>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderEnding(scene,id){
  saveEnding(id);
  const endingNames={end_hermit:'隐士之牙',end_guardian:'守护者之牙',end_survivor:'幸存者之牙',end_requiem:'象牙安魂曲'};
  const e=getEndings();const n=Object.keys(e).length;
  return`
  <div class="ending-screen">
    <div class="ending-icon">${scene.img||'🌙'}</div>
    <div class="ending-title">${scene.title||endingNames[id]||''}</div>
    <div class="ending-tag ${scene.tagClass||'mid'}">${scene.tag||'结局'} · ${scene.ending?'END':''}</div>
    <div class="stats-bar">
      <div class="stat-item"><div class="val">${state.alertness}</div><div style="font-size:11px">警觉度</div></div>
      <div class="stat-item"><div class="val">${state.herdBond}</div><div style="font-size:11px">族群羁绊</div></div>
      <div class="stat-item"><div class="val">${scene.statLabel||'——'}</div></div>
    </div>
    <div class="ending-text">${scene.text}</div>
    ${scene.science?`
    <div class="sci-card" id="scicard_end">
      <div class="sci-header" onclick="document.getElementById('scicard_end').classList.toggle('open')">
        <span>📖</span><span>科学知识卡片</span><span class="arrow">▶</span>
      </div>
      <div class="sci-body">${scene.science}</div>
    </div>`:''}
    <div class="endings-grid">
      <div class="dot ${e.end_hermit?'unlocked':'locked'} ${id==='end_hermit'?'current':''}">${e.end_hermit?'🏞️':'?'}</div>
      <div class="dot ${e.end_guardian?'unlocked':'locked'} ${id==='end_guardian'?'current':''}">${e.end_guardian?'🛡️':'?'}</div>
      <div class="dot ${e.end_survivor?'unlocked':'locked'} ${id==='end_survivor'?'current':''}">${e.end_survivor?'🌄':'?'}</div>
      <div class="dot ${e.end_requiem?'unlocked':'locked'} ${id==='end_requiem'?'current':''}">${e.end_requiem?'🕊️':'?'}</div>
    </div>
    <p style="text-align:center;font-size:12px;color:#A0806A;margin-bottom:12px">已解锁 ${n}/4 个结局</p>
    <div class="btn-container">
      <button class="btn-primary" onclick="showAftermath()">🌍 查看真实数据</button>
      <button class="btn-secondary" onclick="startGame()">↻ 再玩一次</button>
    </div>
  </div>`;
}

function showAftermath(){
  renderAftermath(state.scene);
}

function getProgress(){
  const order=['start','growth','conservative','adventure','trapped'];
  const idx=order.indexOf(state.scene);
  if(idx<0)return 100;
  return Math.round(((idx+1)/order.length)*90);
}
